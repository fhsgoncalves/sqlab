<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">sqlab logo icon combined</title>
  <desc id="desc">Orange sqlab wordmark paths on a dark black and orange gradient background with white border.</desc>

  <defs>
    <radialGradient id="orangeGlowTopLeft" cx="0%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#5a2208" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#1a0f0a" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#080807" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orangeGlowBottomRight" cx="100%" cy="100%" r="75%">
      <stop offset="0%" stop-color="#6a2a08" stop-opacity="0.9"/>
      <stop offset="42%" stop-color="#221008" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#080807" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="darkBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100d0b"/>
      <stop offset="55%" stop-color="#080807"/>
      <stop offset="100%" stop-color="#090807"/>
    </linearGradient>

    <filter id="subtleNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>

    <!-- Clip to the icon bounds -->
    <clipPath id="iconClip">
      <rect width="1024" height="1024"/>
    </clipPath>
  </defs>

  <!-- Background layers from icon.svg -->
  <rect width="1024" height="1024" fill="url(#darkBase)"/>
  <rect width="1024" height="1024" fill="url(#orangeGlowTopLeft)"/>
  <rect width="1024" height="1024" fill="url(#orangeGlowBottomRight)"/>
  <rect width="1024" height="1024" filter="url(#subtleNoise)" opacity="0.45"/>

